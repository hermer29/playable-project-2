name: Cocos Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  COCOS_CREATOR_VERSION: 2.4.15
  COCOS_CREATOR_CACHE_DIR: ~/.cache/cocos-creator/2.4.15
  COCOS_BUILD_PARAMS: "platform=web-mobile;buildPath=build;debug=false;embedWebDebugger=false;webOrientation=portrait"

jobs:
  build:
    name: Build web-mobile
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Cocos Creator cache
        id: cocos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.COCOS_CREATOR_CACHE_DIR }}
          key: windows-cocos-creator-${{ env.COCOS_CREATOR_VERSION }}

      - name: Install Cocos Creator
        if: steps.cocos-cache.outputs.cache-hit != 'true'
        env:
          COCOS_CREATOR_WIN_ZIP_URL: ${{ secrets.COCOS_CREATOR_WIN_ZIP_URL }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:COCOS_CREATOR_WIN_ZIP_URL)) {
            Write-Error "Missing COCOS_CREATOR_WIN_ZIP_URL secret with a direct ZIP URL that contains CocosCreator.exe."
          }

          $installDir = Join-Path $env:USERPROFILE ".cache\cocos-creator\$env:COCOS_CREATOR_VERSION"
          $archivePath = Join-Path $env:RUNNER_TEMP "cocos-creator.zip"
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          Invoke-WebRequest -Uri $env:COCOS_CREATOR_WIN_ZIP_URL -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $installDir -Force

          $creator = Get-ChildItem -Path $installDir -Filter "CocosCreator.exe" -Recurse | Select-Object -First 1
          if (-not $creator) {
            Write-Error "CocosCreator.exe was not found in the downloaded ZIP."
          }

      - name: Verify Cocos Creator
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:USERPROFILE ".cache\cocos-creator\$env:COCOS_CREATOR_VERSION"
          $creator = Get-ChildItem -Path $installDir -Filter "CocosCreator.exe" -Recurse | Select-Object -First 1

          if (-not $creator) {
            Write-Error "CocosCreator.exe was not found in $installDir."
          }

          "COCOS_CREATOR_EXE=$($creator.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build web-mobile
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Remove-Item -Recurse -Force "build" -ErrorAction SilentlyContinue

          & $env:COCOS_CREATOR_EXE `
            --path $env:GITHUB_WORKSPACE `
            --build $env:COCOS_BUILD_PARAMS

          if (-not (Test-Path "build/web-mobile")) {
            Write-Error "Expected build output directory build/web-mobile was not created."
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-mobile
          path: build/web-mobile
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web-mobile

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
