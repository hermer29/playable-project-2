name: Cocos Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  COCOS_CREATOR_VERSION: 2.4.15
  COCOS_CREATOR_CACHE_DIR: ~/.cache/cocos-creator/2.4.15

jobs:
  build:
    name: Build web-mobile
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Cocos Creator cache
        id: cocos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.COCOS_CREATOR_CACHE_DIR }}
          key: windows-cocos-creator-${{ env.COCOS_CREATOR_VERSION }}

      - name: Install Cocos Creator
        if: steps.cocos-cache.outputs.cache-hit != 'true'
        env:
          COCOS_CREATOR_WIN_ZIP_URL: ${{ secrets.COCOS_CREATOR_WIN_ZIP_URL }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:COCOS_CREATOR_WIN_ZIP_URL)) {
            Write-Error "Missing COCOS_CREATOR_WIN_ZIP_URL secret with a direct ZIP URL that contains CocosCreator.exe."
          }

          $installDir = Join-Path $env:USERPROFILE ".cache\cocos-creator\$env:COCOS_CREATOR_VERSION"
          $archivePath = Join-Path $env:RUNNER_TEMP "cocos-creator.zip"
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          Invoke-WebRequest -Uri $env:COCOS_CREATOR_WIN_ZIP_URL -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $installDir -Force

          $creator = Get-ChildItem -Path $installDir -Filter "CocosCreator.exe" -Recurse | Select-Object -First 1
          if (-not $creator) {
            Write-Error "CocosCreator.exe was not found in the downloaded ZIP."
          }

      - name: Verify Cocos Creator
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:USERPROFILE ".cache\cocos-creator\$env:COCOS_CREATOR_VERSION"
          $creator = Get-ChildItem -Path $installDir -Filter "CocosCreator.exe" -Recurse | Select-Object -First 1

          if (-not $creator) {
            Write-Error "CocosCreator.exe was not found in $installDir."
          }

          "COCOS_CREATOR_EXE=$($creator.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build web-mobile
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $buildDir = Join-Path $env:GITHUB_WORKSPACE "build"
          $buildDirForCocos = $buildDir.Replace("\", "/")
          $buildParams = "platform=web-mobile;buildPath=$buildDirForCocos;dest=$buildDirForCocos;debug=false;embedWebDebugger=false;webOrientation=portrait"
          $stdoutLog = Join-Path $env:RUNNER_TEMP "cocos-build.stdout.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "cocos-build.stderr.log"

          Remove-Item -Recurse -Force $buildDir -ErrorAction SilentlyContinue

          Write-Host "Cocos Creator: $env:COCOS_CREATOR_EXE"
          Write-Host "Project path: $env:GITHUB_WORKSPACE"
          Write-Host "Build params: $buildParams"

          $arguments = @("--path", $env:GITHUB_WORKSPACE, "--build", $buildParams)
          $process = Start-Process `
            -FilePath $env:COCOS_CREATOR_EXE `
            -ArgumentList $arguments `
            -Wait `
            -PassThru `
            -NoNewWindow `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog

          if (Test-Path $stdoutLog) {
            Get-Content $stdoutLog
          }

          if (Test-Path $stderrLog) {
            Get-Content $stderrLog
          }

          if ($process.ExitCode -ne 0) {
            Write-Error "Cocos Creator exited with code $($process.ExitCode)."
          }

          $outputDir = Join-Path $buildDir "web-mobile"
          $deadline = (Get-Date).AddMinutes(10)
          while (-not (Test-Path $outputDir) -and (Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 5
          }

          if (-not (Test-Path $outputDir)) {
            if (Test-Path $buildDir) {
              Get-ChildItem -Path $buildDir -Recurse -Depth 3 | Select-Object FullName
            }

            $creatorLogs = Join-Path $env:USERPROFILE ".CocosCreator\logs"
            if (Test-Path $creatorLogs) {
              Get-ChildItem -Path $creatorLogs -File | Sort-Object LastWriteTime -Descending | Select-Object -First 3 | ForEach-Object {
                Write-Host "===== $($_.FullName) ====="
                Get-Content $_.FullName -Tail 200
              }
            }

            Write-Error "Expected build output directory build/web-mobile was not created."
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-mobile
          path: build/web-mobile
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web-mobile

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
