<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | Blast</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  
  <!-- force screen orientation on some browser -->
  <meta name="screen-orientation" content="portrait"/>
  <meta name="x5-orientation" content="portrait">

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style-mobile.25fc5.css"/>
  <link rel="icon" href="favicon.8de18.ico"/>
<!-- blast-centering:start -->
<style>
  html,
  body {
    width: 100% !important;
    height: 100% !important;
    margin: 0 !important;
    overflow: hidden !important;
    background: #000 !important;
  }

  body {
    padding: 0 !important;
    border: 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }

  #Cocos2dGameContainer.blast-pillarbox {
    position: fixed !important;
    left: 50% !important;
    top: 50% !important;
    width: min(calc(100vh * 9 / 16), 100vw) !important;
    height: 100vh !important;
    margin: 0 !important;
    overflow: hidden !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    transform: translate(-50%, -50%) !important;
  }

  #Cocos2dGameContainer.blast-fullscreen {
    position: fixed !important;
    left: 0 !important;
    top: 0 !important;
    width: 100% !important;
    height: 100% !important;
    margin: 0 !important;
    overflow: hidden !important;
    display: block !important;
    transform: none !important;
  }

  #GameCanvas {
    display: block !important;
    position: relative !important;
    left: auto !important;
    top: auto !important;
    margin: 0 !important;
    transform: none !important;
  }

  #splash {
    position: fixed !important;
    left: 50% !important;
    top: 50% !important;
    transform: translate(-50%, -50%) !important;
  }

  body.blast-fullscreen-active #splash {
    left: 0 !important;
    top: 0 !important;
    width: 100% !important;
    height: 100% !important;
    transform: none !important;
  }
</style>
<script>
  (function () {
    function applyGameCanvasSize() {
      var container = document.getElementById('Cocos2dGameContainer');
      var canvas = document.getElementById('GameCanvas');

      if (!container || !canvas) {
        return;
      }

      var viewportW = window.innerWidth || document.documentElement.clientWidth;
      var viewportH = window.innerHeight || document.documentElement.clientHeight;
      var aspectW = 9;
      var aspectH = 16;
      var designWidth = 1080;
      var designHeight = 1920;
      var isNarrow = viewportW / viewportH < aspectW / aspectH;
      var width;
      var height;
      var resolutionPolicy = cc && cc.ResolutionPolicy
        ? cc.ResolutionPolicy.FIXED_HEIGHT
        : 4;

      if (isNarrow) {
        container.classList.remove('blast-pillarbox');
        container.classList.add('blast-fullscreen');
        document.body.classList.add('blast-fullscreen-active');
        width = viewportW;
        height = viewportH;
        if (cc && cc.ResolutionPolicy) {
          resolutionPolicy = cc.ResolutionPolicy.EXACT_FIT;
        }
      } else {
        container.classList.remove('blast-fullscreen');
        container.classList.add('blast-pillarbox');
        document.body.classList.remove('blast-fullscreen-active');
        var rect = container.getBoundingClientRect();
        width = Math.round(rect.width);
        height = Math.round(rect.height);
      }

      if (width <= 0 || height <= 0) {
        return;
      }

      if (window.cc && cc.view && cc.game && cc.game.canvas) {
        cc.game.frame = container;
        cc.view.resizeWithBrowserSize(false);
        cc.view.setFrameSize(width, height);
        cc.view.setDesignResolutionSize(
          designWidth,
          designHeight,
          resolutionPolicy,
        );
      }
    }

    window.__applyBlastCanvasSize = applyGameCanvasSize;
    window.addEventListener('resize', applyGameCanvasSize);
    window.addEventListener('orientationchange', function () {
      setTimeout(applyGameCanvasSize, 50);
    });
    setInterval(applyGameCanvasSize, 250);
    applyGameCanvasSize();
  })();
</script>
<!-- blast-centering:end -->
</head>
<body>
  <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  <div id="splash">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
  </div>

<script src="src/settings.4942c.js" charset="utf-8"></script>

<script src="main.3e7c4.js" charset="utf-8"></script>

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.c7faf.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.7f489.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>
</body>
</html>
